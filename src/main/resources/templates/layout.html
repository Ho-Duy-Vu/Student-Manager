<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${pageTitle}">HUTECH</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">HUTECH</a>
        <div class="navbar-nav me-auto">

            <!-- ADMIN Menu -->
            <a sec:authorize="hasRole('ADMIN')" class="nav-link text-white" th:href="@{/admin/dashboard}">Dashboard</a>
            <a sec:authorize="hasRole('ADMIN')" class="nav-link text-white" th:href="@{/lop}">Quản lý Lớp</a>
            <a sec:authorize="hasRole('ADMIN')" class="nav-link text-white" th:href="@{/sinhvien}">Quản lý Sinh Viên</a>
            <a sec:authorize="hasRole('ADMIN')" class="nav-link text-white" th:href="@{/monhoc}">Quản lý Môn Học</a>
            <a sec:authorize="hasRole('ADMIN')" class="nav-link text-white" th:href="@{/admin/accounts}">Quản lý Quyền</a>

            <!-- USER Menu -->
            <a sec:authorize="hasRole('USER')" class="nav-link text-white" th:href="@{/user/home}">Trang chủ</a>
            <a sec:authorize="hasRole('USER')" class="nav-link text-white" th:href="@{/courseregs}">Đăng ký môn học</a>
            <a sec:authorize="hasRole('USER')" class="nav-link text-white" th:href="@{/courseregs/my-courses}">Môn đã đăng ký</a>
        </div>
        <div class="navbar-nav ms-auto">
            <span sec:authorize="isAuthenticated()" class="navbar-text text-white me-3 d-flex align-items-center gap-2">
                <span>Xin chào, <strong th:text="${currentUserName}"></strong></span>
                <a class="btn btn-outline-light btn-sm py-0 px-2" th:href="@{/sinhvien/edit/{id}(id=${currentUserMssv})}" 
                   title="Sửa hồ sơ">
                    <i class="bi bi-pencil-square" style="font-size: 0.9rem;">✏️</i>
                </a>
            </span>
            <a sec:authorize="isAuthenticated()" class="btn btn-outline-light btn-sm ms-2"
               href="#"
               onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
                Đăng xuất
            </a>
            <form id="logout-form" th:action="@{/auth/logout}" method="post" style="display:none;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
            <a sec:authorize="!isAuthenticated()" class="nav-link text-white" th:href="@{/auth/login}">Đăng nhập</a>
        </div>
    </div>
</nav>

<div class="container" th:replace="${content}">placeholder</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
