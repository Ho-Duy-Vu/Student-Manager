<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - HUTECH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/edu-theme.css}">
</head>
<body>
<section class="auth-page">
    <div class="auth-wrap">
        <div class="auth-grid">
            <div class="auth-brand">
                <h1>HUTECH</h1>
                <p>Khởi tạo tài khoản học vụ để quản lý hồ sơ cá nhân, đăng ký môn học và theo dõi tiến độ học tập thuận tiện hơn.</p>
            </div>
            <div class="auth-form">
                <h2>Đăng ký tài khoản</h2>
                <p class="sub">Điền đầy đủ thông tin để bắt đầu sử dụng hệ thống.</p>

                <form th:action="@{/auth/register}" th:object="${account}" method="post" novalidate>

                <!-- MSSV -->
                <div class="mb-3">
                    <label for="mssv" class="form-label fw-semibold">Mã số sinh viên</label>
                    <input type="text" id="mssv" th:field="*{mssv}"
                           class="form-control" th:classappend="${#fields.hasErrors('mssv')} ? 'is-invalid'"
                           placeholder="Nhập MSSV (10 chữ số)" autofocus>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('mssv')}"
                         th:errors="*{mssv}"></div>
                    <div class="text-danger small" th:if="${errorMssv}" th:text="${errorMssv}"></div>
                </div>

                <!-- Họ tên -->
                <div class="mb-3">
                    <label for="hoTen" class="form-label fw-semibold">Tên sinh viên</label>
                    <input type="text" id="hoTen" th:field="*{hoTen}"
                           class="form-control" th:classappend="${#fields.hasErrors('hoTen')} ? 'is-invalid'"
                           placeholder="Nhập họ và tên đầy đủ">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('hoTen')}"
                         th:errors="*{hoTen}"></div>
                </div>

                <!-- Mật khẩu -->
                <div class="mb-3">
                    <label for="matKhauRaw" class="form-label fw-semibold">Mật khẩu</label>
                    <input type="password" id="matKhauRaw" name="matKhauRaw"
                           class="form-control" placeholder="Nhập mật khẩu" required minlength="6">
                    <div class="form-text">Tối thiểu 6 ký tự.</div>
                </div>

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-success">Đăng ký</button>
                    </div>
                </form>

                <hr>
                <div class="text-center">
                    Đã có tài khoản?
                    <a th:href="@{/auth/login}">Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
