<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HUTECH</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow" style="width: 400px;">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0">HUTECH &ndash; Đăng nhập</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${param.error}" class="alert alert-danger">
                MSSV hoặc mật khẩu không đúng. Vui lòng thử lại.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                Bạn đã đăng xuất thành công.
            </div>
            <div th:if="${param.registered}" class="alert alert-success">
                Đăng ký thành công! Vui lòng đăng nhập.
            </div>

            <form th:action="@{/auth/login}" method="post">
                <div class="mb-3">
                    <label for="mssv" class="form-label fw-semibold">Mã số sinh viên</label>
                    <input type="text" id="mssv" name="mssv" class="form-control"
                           placeholder="Nhập MSSV (10 chữ số)" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="matKhau" class="form-label fw-semibold">Mật khẩu</label>
                    <input type="password" id="matKhau" name="matKhau" class="form-control"
                           placeholder="Nhập mật khẩu" required>
                </div>
                <div class="d-grid mt-3">
                    <button type="submit" class="btn btn-primary">Đăng nhập</button>
                </div>
            </form>

            <hr>
            <div class="text-center">
                Chưa có tài khoản?
                <a th:href="@{/auth/register}">Đăng ký ngay</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
